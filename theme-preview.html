<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生氣風格預覽</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0000;
      min-height: 100vh;
      font-family: 'Noto Sans TC', sans-serif;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
    }

    /* Header */
    .header {
      width: 100%;
      background: #1a0000;
      border-bottom: 2px solid #8B0000;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      font-size: 18px;
      color: #FF3333;
      letter-spacing: 1px;
    }
    .header-user {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #8B0000;
      border: 2px solid #FF3333;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .logout { font-size: 12px; color: #aaa; cursor: pointer; }
    .logout:hover { color: #FF3333; }

    /* Main */
    main {
      width: 100%;
      max-width: 480px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 問候語 */
    .greeting {
      text-align: center;
      font-size: 13px;
      color: #bbb;
    }
    .greeting strong { color: #FF3333; }

    /* 集點卡 */
    .card {
      background: #1a0000;
      border: 2px solid #8B0000;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(139,0,0,0.3);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .card-label {
      font-size: 10px;
      color: #CC4444;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .card-title {
      font-size: 16px;
      font-weight: 900;
      color: #FF3333;
      margin-top: 2px;
    }
    .card-count {
      text-align: right;
    }
    .count-num {
      font-size: 36px;
      font-weight: 900;
      color: #FF3333;
      line-height: 1;
      text-shadow: 0 0 10px rgba(255,51,51,0.5);
    }
    .count-total { font-size: 14px; color: #aaa; }

    /* 格子 */
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .slot {
      aspect-ratio: 1;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      border: 2px dashed #2a0000;
      background: #110000;
      color: #555;
      font-size: 11px;
      font-weight: 700;
    }
    .slot.filled {
      border: 2px solid #8B0000;
      background: #2a0000;
      box-shadow: 0 0 8px rgba(139,0,0,0.4);
      font-size: 22px;
      color: white;
    }
    .slot.filled .stamp-emoji {
      display: block;
      filter: drop-shadow(0 0 4px rgba(255,80,80,0.6));
    }
    .slot.filled .stamp-date {
      font-size: 9px;
      color: #8B0000;
      margin-top: 2px;
    }

    /* 進度條 */
    .progress-bar {
      height: 6px;
      background: #2a0000;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 40%;
      background: linear-gradient(to right, #8B0000, #FF3333);
      border-radius: 99px;
      box-shadow: 0 0 8px rgba(255,51,51,0.5);
    }
    .progress-label {
      font-size: 11px;
      color: #aaa;
      text-align: right;
      margin-top: 6px;
    }
    .progress-label span { color: #FF3333; }

    /* 主按鈕 */
    .main-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, #8B0000, #CC0000);
      color: white;
      font-size: 17px;
      font-weight: 900;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(139,0,0,0.5);
      letter-spacing: 1px;
      transition: all 0.2s;
      text-align: center;
    }
    .main-btn:hover {
      box-shadow: 0 4px 30px rgba(255,51,51,0.6);
      transform: translateY(-1px);
    }

    /* 統計 */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat-card {
      background: #1a0000;
      border: 1px solid #2a0000;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .stat-emoji { font-size: 22px; }
    .stat-label { font-size: 10px; color: #aaa; margin-top: 4px; }
    .stat-count { font-size: 18px; font-weight: 900; color: #FF3333; }

    /* 歷史 */
    .history {
      background: #1a0000;
      border: 1px solid #2a0000;
      border-radius: 16px;
      padding: 16px;
    }
    .history-title {
      font-weight: 700;
      color: #FF3333;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #2a0000;
    }
    .history-item:last-child { border-bottom: none; }
    .history-emoji { font-size: 18px; }
    .history-info { flex: 1; }
    .history-label { font-size: 13px; color: #eee; font-weight: 500; }
    .history-desc { font-size: 11px; color: #999; }
    .history-time { font-size: 11px; color: #888; }
    .history-del { font-size: 11px; color: #666; cursor: pointer; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .history-del:hover { color: #FF3333; background: #2a0000; }

    /* 設定區 */
    .settings {
      background: #1a0000;
      border: 1px solid #2a0000;
      border-radius: 16px;
      overflow: hidden;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #2a0000;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 13px; color: #bbb; }
    .stepper { display: flex; align-items: center; gap: 12px; }
    .step-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #2a0000;
      border: 1px solid #8B0000;
      color: #FF3333;
      font-size: 16px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .step-val { font-size: 16px; font-weight: 700; color: #FF3333; width: 24px; text-align: center; }
    .reset-btn { font-size: 12px; color: #888; cursor: pointer; }
    .reset-btn:hover { color: #FF3333; }

    /* 標籤 */
    .badge {
      position: absolute;
      top: -4px; right: -6px;
      background: #FF3333;
      color: white;
      font-size: 8px;
      font-weight: 700;
      border-radius: 99px;
      padding: 1px 5px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">
      💢 離職集點卡
    </div>
    <div class="header-user">
      <div class="avatar">😤</div>
      <span style="font-size:13px;color:#ccc">Eddie</span>
      <span class="logout">登出</span>
    </div>
  </div>

  <main>
    <div class="greeting">嗨，<strong>Eddie</strong>！今天又被虐了嗎？ 🩸</div>

    <!-- 集點卡 -->
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-label">☠ RESIGNATION CARD ☠</div>
          <div class="card-title">忍耐是有極限的</div>
        </div>
        <div class="card-count">
          <div class="count-num">4</div>
          <div class="count-total">/10</div>
        </div>
      </div>
      <div class="grid">
        <div class="slot filled">
          <span class="stamp-emoji" style="transform:rotate(-8deg)">😤</span>
          <span class="stamp-date">3/18</span>
        </div>
        <div class="slot filled">
          <span class="stamp-emoji" style="transform:rotate(5deg)">😩</span>
          <span class="stamp-date">3/19</span>
        </div>
        <div class="slot filled">
          <span class="stamp-emoji" style="transform:rotate(-3deg)">🌙</span>
          <span class="stamp-date">3/19</span>
        </div>
        <div class="slot filled">
          <span class="stamp-emoji" style="transform:rotate(7deg)">🤡</span>
          <span class="stamp-date">3/20</span>
        </div>
        <div class="slot">5</div>
        <div class="slot">6</div>
        <div class="slot">7</div>
        <div class="slot">8</div>
        <div class="slot">9</div>
        <div class="slot">10</div>
      </div>
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <div class="progress-label">再 <span>6</span> 點就提離職！</div>
    </div>

    <!-- 主按鈕 -->
    <button class="main-btn">又他媽的來了 🔥</button>

    <!-- 統計 -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-emoji">😤</div>
        <div class="stat-label">被罵/責備</div>
        <div class="stat-count">2</div>
      </div>
      <div class="stat-card">
        <div class="stat-emoji">😩</div>
        <div class="stat-label">無效會議</div>
        <div class="stat-count">1</div>
      </div>
      <div class="stat-card">
        <div class="stat-emoji">🌙</div>
        <div class="stat-label">強迫加班</div>
        <div class="stat-count">1</div>
      </div>
    </div>

    <!-- 歷史 -->
    <div class="history">
      <div class="history-title">💢 憤怒紀錄</div>
      <div class="history-item">
        <div class="history-emoji">🤡</div>
        <div class="history-info">
          <div class="history-label">被甩鍋</div>
          <div class="history-desc">明明是他說的</div>
        </div>
        <div class="history-time">剛才</div>
        <div class="history-del">✕</div>
      </div>
      <div class="history-item">
        <div class="history-emoji">🌙</div>
        <div class="history-info">
          <div class="history-label">強迫加班</div>
          <div class="history-desc"></div>
        </div>
        <div class="history-time">昨天</div>
        <div class="history-del">✕</div>
      </div>
      <div class="history-item">
        <div class="history-emoji">😩</div>
        <div class="history-info">
          <div class="history-label">無效會議</div>
          <div class="history-desc">3小時毫無產出</div>
        </div>
        <div class="history-time">2天前</div>
        <div class="history-del">✕</div>
      </div>
    </div>

    <!-- 設定 -->
    <div class="settings">
      <div class="settings-row">
        <span class="settings-label">💀 爆發點（目標格數）</span>
        <div class="stepper">
          <div class="step-btn">−</div>
          <div class="step-val">10</div>
          <div class="step-btn">＋</div>
        </div>
      </div>
      <div class="settings-row">
        <span class="reset-btn">🗑️ 清除所有，重新忍耐</span>
      </div>
    </div>
  </main>

</body>
</html>
